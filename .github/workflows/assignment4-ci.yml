name: assignment4-ci

on:
  push:
    paths:
      - "assignment4/**"
      - ".github/workflows/assignment4-ci.yml"
  pull_request:
    paths:
      - "assignment4/**"

defaults:
  run:
    working-directory: assignment4

jobs:
  test:
    name: pytest + ruff + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install MuJoCo system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install project + dev deps
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Run tests + coverage
        env:
          QT_QPA_PLATFORM: offscreen
          MUJOCO_GL: osmesa
        run: uv run pytest tests/ -q --cov=src/proximal_lab --cov-report=term
